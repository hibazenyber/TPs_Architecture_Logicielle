server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products,/products/**
          filters:
            - RewritePath=/products(?<segment>/?.*), /api/products${segment}

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders,/orders/**
          filters:
            - RewritePath=/orders(?<segment>/?.*), /api/orders${segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
